services:
  - type: web
    name: finoerp
    runtime: static
    installCommand: corepack enable && pnpm install --ignore-scripts
    buildCommand: cd app && pnpm run build && cp -r .output/public ../dist
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
